var sortedDirectory = [].concat(directoryData).sort(function (a, b) {
  var aLetter = getFirstLetter(a);
  var bLetter = getFirstLetter(b);

  // 先按首字母排序
  if (aLetter !== bLetter) {
    return aLetter.localeCompare(bLetter);
  }

  // 首字母相同则按中文排序
  return a.localeCompare(b);
});
// 按首字母分组
var groupedDirectory = {};
sortedDirectory.forEach(function (item) {
  var letter = getFirstLetter(item);
  if (!groupedDirectory[letter]) {
    groupedDirectory[letter] = [];
  }
  groupedDirectory[letter].push(item);
});
// 生成目录列表
var directoryList = document.getElementById('directory-list');
function renderDirectory() {
  var letter = arguments.length > 0 && arguments[0] !== undefined ? arguments[0] : 'all';
  directoryList.innerHTML = '';
  var itemsToRender = [];
  if (letter === 'all') {
    // 渲染所有字母分组
    for (var letterKey in groupedDirectory) {
      itemsToRender = itemsToRender.concat(groupedDirectory[letterKey]);
    }
  } else {
    // 只渲染特定字母分组
    itemsToRender = groupedDirectory[letter] || [];
  }

  // 更新总数显示
  document.getElementById('total-count').textContent = itemsToRender.length;
  document.getElementById('pagination-total').textContent = itemsToRender.length;

  // 只显示前20条（模拟分页）
  var displayedItems = itemsToRender.slice(0, 20);
  displayedItems.forEach(function (item, index) {
    var itemElement = document.createElement('div');
    itemElement.className = "p-4 hover:bg-primary/10 transition-colors".concat(index % 2 === 0 ? 'bg-white' : 'bg-light-1/50');
    itemElement.dataset.item = item;
    var itemLink = document.createElement('a');
    itemLink.href = 'javascript:void(0);';
    itemLink.className = 'flex items-center justify-between w-full directory-item-link';
    itemLink.dataset.item = item;
    var itemText = document.createElement('span');
    itemText.className = 'text-dark hover:text-primary transition-colors';
    itemText.textContent = item;
    var itemIcon = document.createElement('i');
    itemIcon.className = 'fas fa-chevron-right text-light-3 hover:text-primary transition-colors directory-item-icon';
    itemLink.appendChild(itemText);
    itemLink.appendChild(itemIcon);
    itemElement.appendChild(itemLink);

    // 添加列表容器
    var listContainer = document.createElement('div');
    listContainer.className = 'hidden overflow-hidden transition-all duration-300 directory-list-container';
    listContainer.id = 'list-' + item.replace(/\W+/g, '-');
    itemElement.appendChild(listContainer);
    directoryList.appendChild(itemElement);
  });
}

document.addEventListener('click', function (e) {
  if (e.target.closest('.directory-item-link')) {
    var link = e.target.closest('.directory-item-link');
    var item = link.dataset.item;
    var itemElement = link.parentElement;
    var icon = link.querySelector('.directory-item-icon');
    var listContainer = itemElement.querySelector('.directory-list-container');

    // 切换展开/收起状态
    listContainer.classList.toggle('hidden');
    itemElement.classList.toggle('bg-primary/10');
    if (listContainer.classList.contains('hidden')) {
      icon.classList.remove('rotate-90');
    } else {
      icon.classList.add('rotate-90');
      // 如果列表为空，加载数据
      if (listContainer.innerHTML === '') {
        loadProcessList(item, listContainer);
      }
    }
  } else if (e.target.closest('.risk-point-item')) {
    // 点击风险点条目，打开详情弹窗
    var riskItem = e.target.closest('.risk-point-item');
    var processName = riskItem.dataset.processName;
    var riskPoint = JSON.parse(riskItem.dataset.riskPoint);
    openRiskDetailModal(processName, riskPoint);

});

  <script>// 全选功能
var selectAllCheckbox = document.getElementById('select-all');
var rowCheckboxes = document.querySelectorAll('.row-checkbox');
selectAllCheckbox.addEventListener('change', function () {
  rowCheckboxes.forEach(function (checkbox) {
    checkbox.checked = selectAllCheckbox.checked;
  });
});

// 单选功能，同步全选状态
rowCheckboxes.forEach(function (checkbox) {
  checkbox.addEventListener('change', function () {
    var allChecked = Array.from(rowCheckboxes).every(function (cb) {
      return cb.checked;
    });
    selectAllCheckbox.checked = allChecked;
  });
});</script>
