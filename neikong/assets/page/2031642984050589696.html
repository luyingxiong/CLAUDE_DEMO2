// 对内容进行分组
function groupContentByFirstLetter(contentArray) {
  var groups = {};
  contentArray.forEach(function (item) {
    var firstLetter = getFirstLetter(item);
    if (!groups[firstLetter]) {
      groups[firstLetter] = [];
    }
    groups[firstLetter].push(item);
  });

  // 按字母顺序排序
  var sortedGroups = {};
  Object.keys(groups).sort().forEach(function (key) {
    sortedGroups[key] = groups[key];
  });
  return sortedGroups;
}
// 渲染内容列表
function renderContentList(groups) {
  var contentList = document.getElementById('content-list');
  contentList.innerHTML = '';
  if (Object.keys(groups).length === 0) {
    contentList.innerHTML = "<div class=\"text-center text-light py-10\">\n                        <i class=\"fas fa-search text-4xl mb-3 opacity-20\"></i>\n                        <p>\u6CA1\u6709\u627E\u5230\u5339\u914D\u7684\u7ED3\u679C</p>\n                    </div>";
    return;
  }
  var _loop = function _loop() {
    var groupDiv = document.createElement('div');
    groupDiv.className = 'mb-6';

    // 字母标题
    var letterHeader = document.createElement('div');
    letterHeader.className = 'text-primary font-semibold text-lg mb-3 pl-2 border-l-4 border-primary';
    letterHeader.textContent = letter;
    groupDiv.appendChild(letterHeader);

    // 内容列表
    var listUl = document.createElement('ul');
    listUl.className = 'space-y-2';
    groups[letter].forEach(function (item) {
      var listItem = document.createElement('li');
      listItem.className = 'bg-white rounded-lg p-3 shadow-sm hover:shadow-md transition-shadow';
      var link = document.createElement('a');
      link.href = 'javascript:void(0);';
      link.className = 'block w-full text-left';
      link.textContent = item;
      listItem.appendChild(link);
      listUl.appendChild(listItem);
    });
    groupDiv.appendChild(listUl);
    contentList.appendChild(groupDiv);
  };
  for (var letter in groups) {
    _loop();
  }
}
// 初始化页面
function initPage() {
  // 按首字母分组内容
  var groupedContent = groupContentByFirstLetter(contentData);
  // 渲染内容列表
  renderContentList(groupedContent);

  // 字母索引点击事件
  var letterButtons = document.querySelectorAll('.letter-index');
  letterButtons.forEach(function (button) {
    button.addEventListener('click', function () {
      // 移除所有激活状态
      letterButtons.forEach(function (btn) {
        return btn.classList.remove('letter-index-active');
      });
      // 添加当前激活状态
      this.classList.add('letter-index-active');
      var letter = this.getAttribute('data-letter');
      var targetElement = document.querySelector("div:has(> div.text-primary:contains('".concat(letter, "'))"));
      if (targetElement) {
        // 平滑滚动到目标位置
        targetElement.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    });
  });

  // 搜索功能
  var searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', function () {
    var searchTerm = this.value.trim().toLowerCase();
    if (searchTerm === '') {
      // 如果搜索框为空，显示所有内容
      renderContentList(groupedContent);
      return;
    }

    // 过滤内容
    var filteredContent = contentData.filter(function (item) {
      return item.toLowerCase().includes(searchTerm);
    });

    // 重新分组并渲染
    var filteredGroups = groupContentByFirstLetter(filteredContent);
    renderContentList(filteredGroups);
  });
}
// 页面加载完成后初始化
window.addEventListener('load', initPage);
