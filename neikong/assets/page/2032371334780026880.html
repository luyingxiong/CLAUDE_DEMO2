  <!-- [JSMOD] h9k_答题逻辑处理 --> 
  <script id="answer-handler">document.addEventListener('DOMContentLoaded', function () {
  // 获取DOM元素
  var options = document.querySelectorAll('.option');
  var submitBtn = document.getElementById('submit-btn');
  var viewBtn = document.getElementById('view-btn');
  var feedback = document.getElementById('feedback');
  // 正确答案
  var correctAnswer = "A";
  var selectedOption = null;
  var isAnswered = false;
  // 选项点击事件
  options.forEach(function (option) {
    option.addEventListener('click', function () {
      if (isAnswered) return;
      // 移除其他选项的选中状态
      options.forEach(function (opt) {
        return opt.classList.remove('selected');
      });
      // 设置当前选项为选中状态
      this.classList.add('selected');
      selectedOption = this.dataset.option;
    });
  });
  // 提交答案按钮点击事件
  submitBtn.addEventListener('click', function () {
    if (!selectedOption) {
      feedback.textContent = "请选择一个答案";
      feedback.className = "mb-6 p-3 rounded-lg text-sm bg-yellow-100 text-yellow-800";
      return;
    }
    isAnswered = true;
    if (selectedOption === correctAnswer) {
      // 答案正确
      feedback.textContent = "回答正确！正确答案：额外核验";
      feedback.className = "mb-6 p-3 rounded-lg text-sm bg-green-100 text-green-800";
      // 显示正确选项的标记
      highlightCorrectAnswer();
    } else {
      // 答案错误
      feedback.textContent = "回答错误！正确答案：额外核验";
      feedback.className = "mb-6 p-3 rounded-lg text-sm bg-red-100 text-red-800";
      // 显示正确选项的标记
      highlightCorrectAnswer();
    }
    // 启用下一题按钮
    nextBtn.classList.remove('btn-disabled', 'bg-gray-300');
    nextBtn.classList.add('bg-primary');
  });
  // 查看答案按钮点击事件
  viewBtn.addEventListener('click', function () {
    isAnswered = true;
    feedback.textContent = "正确答案：额外核验";
    feedback.className = "mb-6 p-3 rounded-lg text-sm bg-blue-100 text-blue-800";
    // 显示正确选项的标记
    highlightCorrectAnswer();
    // 启用下一题按钮
    nextBtn.classList.remove('btn-disabled', 'bg-gray-300');
    nextBtn.classList.add('bg-primary');
  });
  // 下一题按钮点击事件

  // 添加按钮点击事件
  // 高亮显示正确答案
  function highlightCorrectAnswer() {
    options.forEach(function (option) {
      if (option.dataset.option === correctAnswer) {
        option.classList.add('selected');
        var radio = option.querySelector('div:first-child');
        radio.innerHTML = '<i class="fas fa-check text-primary text-xs"></i>';
      }
    });
  }
  // 重置答题状态
  function resetQuiz() {
    // 清空选中状态
    options.forEach(function (option) {
      option.classList.remove('selected');
      var radio = option.querySelector('div:first-child');
      radio.innerHTML = '';
    });
    // 隐藏反馈信息
    feedback.classList.add('hidden');
    // 重置状态变量
    selectedOption = null;
    isAnswered = false;
    // 禁用下一题按钮
    nextBtn.classList.add('btn-disabled', 'bg-gray-300');
    nextBtn.classList.remove('bg-primary');
  }
});</script>
