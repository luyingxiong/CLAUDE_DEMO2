  <script id="chat-functionality">
   document.addEventListener('DOMContentLoaded', function () {
  var chatContainer = document.getElementById('chat-container');

  // 添加消息到聊天窗口
  function addMessageToChat(content, sender) {
    var messageDiv = document.createElement('div');
    messageDiv.className = 'flex items-start gap-3';
    var avatar, bubbleClass, icon;
    if (sender === 'user') {
      avatar = 'bg-primary/10 text-primary';
      bubbleClass = 'chat-bubble-user';
      icon = 'fa-user';
    } else {
      avatar = 'bg-primary text-white';
      bubbleClass = 'chat-bubble-ai';
      icon = 'fa-robot';
    }
    messageDiv.innerHTML = "<div class=\"w-8 h-8 rounded-full".concat(avatar, "flex items-center justify-center flex-shrink-0\">\n                        <i class=\"fas").concat(icon, "\"></i>\n                    </div>\n                    <div class=\"max-w-[85%]\">\n                        <div class=\"").concat(bubbleClass, "p-3\">\n                            <p>").concat(content, "</p>\n                        </div>\n                        <div class=\"text-xs text-textLight mt-1\">\u521A\u521A</div>\n                    </div>");
    chatContainer.appendChild(messageDiv);
    // 滚动到底部
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }
});
  </script> 
  <!-- [/JSMOD] j2m_问答交互功能 -- 实现用户提问和AI回答的交互功能，包括提交问题、显示对话和模拟AI回答 --> 
  <!-- [JSMOD] k3n_响应式调整 --> 
  <script id="responsive-handler">
   // 处理窗口大小变化时的响应式调整
function handleResize() {
  var chatContainer = document.getElementById('chat-container');
  if (chatContainer) {
    // 确保聊天容器高度正确
    chatContainer.style.height = "calc(100% -".concat(chatContainer.previousElementSibling.offsetHeight, "px)");
  }
}

// 初始调用和窗口大小变化时调用
window.addEventListener('load', handleResize);
window.addEventListener('resize', handleResize);
  </script>
