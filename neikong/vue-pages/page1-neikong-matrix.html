<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>内控矩阵</title>
  <link rel="stylesheet" href="https://unpkg.com/vant@4/lib/index.css"/>
  <link rel="stylesheet" href="../font-awesome/css/all.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #f5f7fa;
      overflow: hidden;
      height: 100vh;
    }
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .status-bar {
      flex-shrink: 0;
      background: #fff;
      padding: 5px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      font-size: 11px;
      color: #333;
    }
    .status-bar .status-icons { display: flex; gap: 5px; align-items: center; }
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* 自定义 van-index-bar 锚点样式 */
    .van-index-anchor { color: #165DFF; font-weight: 600; }
    /* ConfigProvider 主题色 */
    :root {
      --van-primary-color: #165DFF;
      --van-index-anchor-text-color: #165DFF;
      --van-index-bar-index-active-color: #165DFF;
    }
    .empty-tip {
      text-align: center;
      padding: 40px 0;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="app-shell">
    <!-- StatusBar：手机顶部状态栏 -->
    <status-bar />

    <!-- NavBar：页面标题 -->
    <van-nav-bar title="内控矩阵" :border="true">
      <template #right>
        <van-icon name="ellipsis" size="18" color="#86909C"/>
      </template>
    </van-nav-bar>

    <!-- SearchSection：搜索区域 -->
    <search-section
      v-model:query="searchQuery"
      @search="onSearch"
    />

    <!-- ProcessList：流程列表，flex-1 独立滚动 -->
    <div class="scroll-area">
      <process-list
        :groups="filteredGroups"
        :index-list="indexList"
      />
    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vant@4/lib/vant.min.js"></script>
<script>
const { createApp, ref, computed } = Vue;

// ─── StatusBar ──────────────────────────────────────────────
const StatusBar = {
  name: 'StatusBar',
  template: `
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <i class="fas fa-signal" style="font-size:11px;color:#333"></i>
        <i class="fas fa-wifi" style="font-size:11px;color:#333"></i>
        <i class="fas fa-battery-full" style="font-size:11px;color:#333"></i>
      </div>
    </div>
  `
};

// ─── SearchSection ──────────────────────────────────────────
// 职责：搜索输入，props-down/events-up
const SearchSection = {
  name: 'SearchSection',
  props: {
    query: { type: String, default: '' }
  },
  emits: ['update:query', 'search'],
  setup(props, { emit }) {
    return {
      handleUpdate: (val) => emit('update:query', val),
      handleSearch: (val) => emit('search', val),
    };
  },
  template: `
    <van-search
      :model-value="query"
      placeholder="流程查询"
      background="#fff"
      @update:model-value="handleUpdate"
      @search="handleSearch"
      @clear="handleUpdate('')"
      show-action
      @cancel="handleUpdate('')"
    />
  `
};

// ─── ProcessList ────────────────────────────────────────────
// 职责：渲染字母索引 + 分组列表
const ProcessList = {
  name: 'ProcessList',
  props: {
    groups: { type: Array, required: true },
    indexList: { type: Array, required: true }
  },
  template: `
    <div>
      <template v-if="groups.length">
        <van-index-bar :index-list="indexList" sticky>
          <template v-for="group in groups" :key="group.letter">
            <van-index-anchor :index="group.letter" />
            <van-cell
              v-for="item in group.items"
              :key="item.name"
              :title="item.name"
              :label="item.code"
              is-link
              :border="true"
            />
          </template>
        </van-index-bar>
      </template>
      <div v-else class="empty-tip">
        <van-empty description="未找到相关流程" />
      </div>
    </div>
  `
};

// ─── useProcessList composable ───────────────────────────────
// 职责：列表数据 + 搜索过滤逻辑（与 UI 解耦）
function useProcessList() {
  const allGroups = [
    {
      letter: 'A',
      items: [
        { name: '按揭贷款管理', code: 'A001' },
        { name: '安全生产管理', code: 'A002' },
      ]
    },
    {
      letter: 'B',
      items: [
        { name: '保全服务流程管理', code: 'B001' },
        { name: '保险核保管理', code: 'B002' },
        { name: '保险理赔处理', code: 'B003' },
        { name: '保险销售合规管理', code: 'B004' },
      ]
    },
    {
      letter: 'C',
      items: [
        { name: '财务报告管理', code: 'C001' },
        { name: '财务预算控制', code: 'C002' },
        { name: '操作风险管理', code: 'C003' },
        { name: '出纳资金管理', code: 'C004' },
      ]
    },
    {
      letter: 'D',
      items: [
        { name: '贷款发放管理', code: 'D001' },
        { name: '代理业务合规管理', code: 'D002' },
      ]
    },
    {
      letter: 'F',
      items: [
        { name: '法律合规管理', code: 'F001' },
        { name: '反洗钱监控管理', code: 'F002' },
        { name: '风险评估管理', code: 'F003' },
      ]
    },
    {
      letter: 'G',
      items: [
        { name: '供应商资质管理', code: 'G001' },
        { name: '公文档案管理', code: 'G002' },
      ]
    },
    {
      letter: 'H',
      items: [
        { name: '合同审批管理', code: 'H001' },
        { name: '行政后勤管理', code: 'H002' },
      ]
    },
    {
      letter: 'J',
      items: [
        { name: '绩效考核管理', code: 'J001' },
        { name: '精算评估管理', code: 'J002' },
        { name: '决策审批流程', code: 'J003' },
      ]
    },
    {
      letter: 'K',
      items: [
        { name: '客户服务质量管理', code: 'K001' },
        { name: '客户信息安全管理', code: 'K002' },
      ]
    },
    {
      letter: 'L',
      items: [
        { name: '理赔支付审核', code: 'L001' },
        { name: '流动性风险管理', code: 'L002' },
      ]
    },
    {
      letter: 'M',
      items: [
        { name: '满期保险金管理', code: 'M001' },
        { name: '内部审计管理', code: 'M002' },
      ]
    },
    {
      letter: 'N',
      items: [
        { name: '内控自评管理', code: 'N001' },
        { name: '内部培训体系', code: 'N002' },
      ]
    },
    {
      letter: 'Q',
      items: [
        { name: '签单业务管理', code: 'Q001' },
        { name: '前台服务控制', code: 'Q002' },
      ]
    },
    {
      letter: 'R',
      items: [
        { name: '人力资源规划管理', code: 'R001' },
        { name: '日常运营监控', code: 'R002' },
      ]
    },
    {
      letter: 'S',
      items: [
        { name: '审计监督管理', code: 'S001' },
        { name: '数据安全防护', code: 'S002' },
        { name: '索赔业务处理', code: 'S003' },
      ]
    },
  ];

  const searchQuery = ref('');

  const filteredGroups = computed(() => {
    const q = searchQuery.value.trim();
    if (!q) return allGroups;
    return allGroups
      .map(g => ({ ...g, items: g.items.filter(i => i.name.includes(q) || i.code.includes(q)) }))
      .filter(g => g.items.length > 0);
  });

  const indexList = computed(() => filteredGroups.value.map(g => g.letter));

  return { searchQuery, filteredGroups, indexList };
}

// ─── App（组合层，保持薄）───────────────────────────────────
const app = createApp({
  components: { StatusBar, SearchSection, ProcessList },
  setup() {
    const { searchQuery, filteredGroups, indexList } = useProcessList();

    function onSearch(val) {
      searchQuery.value = val;
    }

    return { searchQuery, filteredGroups, indexList, onSearch };
  }
});

app.use(vant);
app.mount('#app');
</script>
</body>
</html>
